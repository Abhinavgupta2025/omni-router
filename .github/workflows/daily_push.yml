name: Daily Auto Push

on:
  schedule:
    - cron: '0 0 * * *' # Runs everyday at midnight UTC
  workflow_dispatch: # Allows manual run via GitHub UI

permissions:
  contents: write # Grants write permission to push commits back to the repo

jobs:
  auto_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update daily files
        run: |
          mkdir -p activity
          
          # File 1: update timestamp status text
          echo "Omni-Router gateway status active as of: $(date)" > activity/status.txt
          
          # File 2: update JSON metadata
          echo '{ "last_ping": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'", "status": "online" }' > activity/ping.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add activity/status.txt activity/ping.json
          git commit -m "chore: daily status ping [skip ci]" || exit 0
          git push
